<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#070b14" />
    <meta name="description" content="Flexiable_Dashboard - AI-Powered Multi-Domain Dashboard" />
    <title>Flexiable_Dashboard Dashboard</title>

    <!--
      Preconnect: tells the browser to open TCP+TLS connections to these
      origins in parallel with HTML parsing — shaves 200-500 ms off TTFB
      for fonts and the AI API on first load.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://openrouter.ai" />

    <!--
      Font stylesheet as a <link> instead of CSS @import.
      @import is render-blocking (browser must download + parse the CSS
      before it can fetch the fonts). A <link> tag loads in parallel.
      media="print" + onload trick makes it non-render-blocking entirely.
    -->
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap"
    />
    <!-- Fallback for no-JS: loads synchronously -->
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap"
      />
    </noscript>

    <!-- Critical inline styles: prevents flash of unstyled background -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #070b14; font-family: 'DM Sans', system-ui, sans-serif; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
